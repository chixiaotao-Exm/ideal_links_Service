services:
  openai-pay-long-link:
    build: .
    container_name: openai-pay-long-link
    restart: unless-stopped
    ports:
      - "8791:8791"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8791/api/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
